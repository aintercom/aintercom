<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AINTERCOM OS — Connexion Régie</title>
<meta name="description" content="Accédez à la plateforme de régie événementielle AINTERCOM OS. Gestion de concerts en arena et stade.">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   TOKENS (identique à index.html)
═══════════════════════════════════════ */
:root{
  --bg:#080808;
  --bg2:#0e0e0e;
  --surface:#121212;
  --panel:#181818;
  --border:#1f1f1f;
  --border2:#2a2a2a;
  --border3:#333;
  --orange:#1877F2;
  --orange-dim:#1359c0;
  --orange-glow:rgba(24,119,242,.18);
  --orange-subtle:rgba(24,119,242,.06);
  --t1:#ffffff;
  --t2:#a0c8ff;
  --t3:#4d8fe8;
  --t4:#1a5fb4;
  --f-display:'Oswald',sans-serif;
  --f-body:'Inter',sans-serif;
  --f-hero:'Bebas Neue',sans-serif;
  --f-mono:'Share Tech Mono',monospace;
  --max:1160px;
  --px:clamp(20px,5vw,64px);
}

*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
body{
  background:var(--bg);
  color:var(--t1);
  font-family:var(--f-body);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:20px;
  position:relative;
  overflow:hidden;
}

/* ═══════════════════════════════════════
   BACKGROUND EFFECTS
═══════════════════════════════════════ */
.login-bg-glow{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:min(800px,120vw);
  height:min(800px,120vw);
  background:radial-gradient(circle,rgba(24,119,242,.12) 0%,transparent 60%);
  pointer-events:none;
  z-index:-1;
}

.login-scanlines{
  position:fixed;
  inset:0;
  background-image:linear-gradient(transparent 49%,rgba(24,119,242,.03) 50%);
  background-size:100% 4px;
  pointer-events:none;
  opacity:.5;
  z-index:-1;
}

/* ═══════════════════════════════════════
   LOGIN CONTAINER
═══════════════════════════════════════ */
.login-container{
  width:100%;
  max-width:440px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  padding:clamp(40px,5vw,60px) clamp(32px,4vw,48px);
  position:relative;
  z-index:10;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}

.login-header{
  text-align:center;
  margin-bottom:40px;
}

.login-logo{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:16px;
  margin-bottom:24px;
}

.logo-mark{
  width:48px;
  height:48px;
  background:var(--orange);
  clip-path:polygon(0 0,100% 0,100% 68%,68% 100%,0 100%);
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:var(--f-mono);
  font-size:12px;
  font-weight:700;
  color:#fff;
  letter-spacing:-1px;
}

.logo-text{
  font-family:var(--f-display);
  font-size:24px;
  font-weight:700;
  letter-spacing:4px;
  color:var(--t1);
}

.login-subtitle{
  font-family:var(--f-mono);
  font-size:12px;
  letter-spacing:3px;
  color:var(--t3);
  margin-top:4px;
}

.login-title{
  font-family:var(--f-hero);
  font-size:clamp(32px,4vw,42px);
  letter-spacing:2px;
  color:var(--t1);
  margin-bottom:12px;
  line-height:1;
}

.login-description{
  font-family:var(--f-body);
  font-size:15px;
  font-weight:300;
  color:var(--t2);
  line-height:1.6;
  max-width:320px;
  margin:0 auto;
}

/* ═══════════════════════════════════════
   FORM STYLES
═══════════════════════════════════════ */
.login-form{
  display:flex;
  flex-direction:column;
  gap:24px;
}

.form-group{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.form-label{
  font-family:var(--f-mono);
  font-size:11px;
  letter-spacing:2px;
  color:var(--t3);
  text-transform:uppercase;
}

.form-input{
  padding:16px 20px;
  background:var(--panel);
  border:1px solid var(--border2);
  border-radius:4px;
  color:var(--t1);
  font-family:var(--f-body);
  font-size:15px;
  transition:all .2s;
}

.form-input:focus{
  outline:none;
  border-color:var(--orange);
  box-shadow:0 0 0 3px var(--orange-subtle);
}

.form-input::placeholder{
  color:var(--t3);
  opacity:.5;
}

/* ═══════════════════════════════════════
   BUTTONS
═══════════════════════════════════════ */
.btn-primary{
  font-family:var(--f-display);
  font-size:16px;
  font-weight:700;
  letter-spacing:3px;
  padding:18px 32px;
  border-radius:4px;
  border:none;
  background:var(--orange);
  color:#fff;
  cursor:pointer;
  transition:all .2s;
  box-shadow:0 4px 0 var(--orange-dim),0 0 30px var(--orange-glow);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-top:8px;
}

.btn-primary:hover{
  filter:brightness(1.1);
  transform:translateY(-2px);
  box-shadow:0 6px 0 var(--orange-dim),0 0 40px rgba(24,119,242,.25);
}

.btn-primary:active{
  transform:translateY(0);
  box-shadow:0 2px 0 var(--orange-dim),0 0 20px var(--orange-glow);
}

.btn-google{
  background:transparent;
  border:1px solid var(--border3);
  color:var(--t2);
  box-shadow:none;
}

.btn-google:hover{
  border-color:var(--orange);
  color:var(--orange);
  background:rgba(24,119,242,.05);
}

.btn-secondary{
  font-family:var(--f-display);
  font-size:14px;
  font-weight:600;
  letter-spacing:2px;
  padding:14px 24px;
  border-radius:4px;
  border:1px solid var(--border3);
  background:transparent;
  color:var(--t2);
  cursor:pointer;
  transition:all .2s;
}

.btn-secondary:hover{
  border-color:var(--orange);
  color:var(--orange);
}

/* ═══════════════════════════════════════
   FORM TOGGLE (Login/Signup)
═══════════════════════════════════════ */
.form-toggle{
  display:flex;
  gap:2px;
  background:var(--panel);
  border:1px solid var(--border2);
  border-radius:4px;
  padding:4px;
  margin-bottom:8px;
}

.toggle-btn{
  flex:1;
  padding:12px 16px;
  border:none;
  background:transparent;
  color:var(--t3);
  font-family:var(--f-mono);
  font-size:11px;
  letter-spacing:2px;
  cursor:pointer;
  border-radius:3px;
  transition:all .2s;
}

.toggle-btn.active{
  background:var(--orange);
  color:#fff;
}

/* ═══════════════════════════════════════
   SEPARATOR
═══════════════════════════════════════ */
.separator{
  display:flex;
  align-items:center;
  gap:16px;
  margin:20px 0;
}

.separator-line{
  flex:1;
  height:1px;
  background:var(--border2);
}

.separator-text{
  font-family:var(--f-mono);
  font-size:11px;
  letter-spacing:2px;
  color:var(--t3);
  white-space:nowrap;
}

/* ═══════════════════════════════════════
   LINKS & FOOTER
═══════════════════════════════════════ */
.login-links{
  display:flex;
  justify-content:space-between;
  margin-top:24px;
  padding-top:24px;
  border-top:1px solid var(--border2);
}

.login-link{
  font-family:var(--f-mono);
  font-size:11px;
  letter-spacing:1px;
  color:var(--t3);
  text-decoration:none;
  transition:color .2s;
}

.login-link:hover{
  color:var(--orange);
}

.login-footer{
  margin-top:40px;
  text-align:center;
}

.login-footer-text{
  font-family:var(--f-mono);
  font-size:10px;
  letter-spacing:2px;
  color:var(--t4);
}

/* ═══════════════════════════════════════
   MESSAGES & ALERTS
═══════════════════════════════════════ */
.message{
  padding:16px 20px;
  border-radius:4px;
  font-family:var(--f-body);
  font-size:14px;
  margin-bottom:24px;
  display:none;
}

.message.success{
  background:rgba(24,119,242,.1);
  border:1px solid var(--orange);
  color:var(--t2);
  display:block;
}

.message.error{
  background:rgba(255,59,59,.1);
  border:1px solid #ff3b3b;
  color:#ff8a8a;
  display:block;
}

.message.info{
  background:rgba(255,193,7,.1);
  border:1px solid #ffc107;
  color:#ffd54f;
  display:block;
}

/* ═══════════════════════════════════════
   DEMO BADGE
═══════════════════════════════════════ */
.demo-badge{
  position:absolute;
  top:20px;
  right:20px;
  font-family:var(--f-mono);
  font-size:10px;
  letter-spacing:2px;
  color:var(--t3);
  background:var(--panel);
  border:1px solid var(--border2);
  padding:4px 12px;
  border-radius:3px;
  z-index:20;
}

/* ═══════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════ */
@media(max-width:480px){
  .login-container{
    padding:32px 24px;
  }
  
  .login-links{
    flex-direction:column;
    gap:12px;
    align-items:center;
  }
  
  .btn-primary,.btn-secondary{
    padding:16px 24px;
  }
}
</style>
</head>
<body>
<div class="login-bg-glow"></div>
<div class="login-scanlines"></div>

<div class="demo-badge">MODE DÉMO</div>

<div class="login-container">
  <div class="login-header">
    <div class="login-logo">
      <div class="logo-mark">AI</div>
      <div class="logo-text">AINTERCOM OS</div>
    </div>
    <div class="login-subtitle">THIS IS IT EVENT</div>
    <h1 class="login-title">ACCÈS RÉGIE</h1>
    <p class="login-description">
      Connectez-vous pour accéder à la plateforme de régie événementielle.
      Gestion complète de vos concerts en arena et stade.
    </p>
  </div>

  <div id="message" class="message"></div>

  <div class="form-toggle">
    <button class="toggle-btn active" id="toggle-login" onclick="showLoginForm()">CONNEXION</button>
    <button class="toggle-btn" id="toggle-signup" onclick="showSignupForm()">INSCRIPTION</button>
  </div>

  <!-- Login Form -->
  <form id="login-form" class="login-form">
    <div class="form-group">
      <label class="form-label" for="login-email">EMAIL</label>
      <input type="email" id="login-email" class="form-input" placeholder="regie@votreevent.com" required>
    </div>
    
    <div class="form-group">
      <label class="form-label" for="login-password">MOT DE PASSE</label>
      <input type="password" id="login-password" class="form-input" placeholder="••••••••" required>
    </div>
    
    <button type="submit" class="btn-primary" id="login-submit">
      <span>▶ CONNEXION</span>
    </button>
  </form>

  <!-- Signup Form -->
  <form id="signup-form" class="login-form" style="display:none;">
    <div class="form-group">
      <label class="form-label" for="signup-name">NOM COMPLET</label>
      <input type="text" id="signup-name" class="form-input" placeholder="John Doe" required>
    </div>
    
    <div class="form-group">
      <label class="form-label" for="signup-email">EMAIL PROFESSIONNEL</label>
      <input type="email" id="signup-email" class="form-input" placeholder="regie@votreevent.com" required>
    </div>
    
    <div class="form-group">
      <label class="form-label" for="signup-password">MOT DE PASSE</label>
      <input type="password" id="signup-password" class="form-input" placeholder="Minimum 8 caractères" required minlength="8">
    </div>
    
    <div class="form-group">
      <label class="form-label" for="signup-confirm">CONFIRMER LE MOT DE PASSE</label>
      <input type="password" id="signup-confirm" class="form-input" placeholder="••••••••" required minlength="8">
    </div>
    
    <button type="submit" class="btn-primary" id="signup-submit">
      <span>▶ CRÉER MON COMPTE</span>
    </button>
  </form>

  <div class="separator">
    <div class="separator-line"></div>
    <div class="separator-text">OU CONTINUER AVEC</div>
    <div class="separator-line"></div>
  </div>

  <button class="btn-primary btn-google" id="google-signin">
    <span>▶ CONTINUER AVEC GOOGLE</span>
  </button>

  <div class="login-links">
    <a href="#" class="login-link" onclick="showForgotPassword()">Mot de passe oublié ?</a>
    <a href="index.html" class="login-link">← Retour à l'accueil</a>
  </div>
  
  <div style="margin-top: 20px; text-align: center;">
    <button class="btn-secondary" id="test-btn" onclick="alert('✅ Test réussi ! Le JavaScript est bien chargé.')" style="padding: 10px 20px; font-size: 12px; background: var(--panel); border: 1px solid var(--border2); color: var(--t2); cursor: pointer; border-radius: 4px;">
      🧪 TEST DE VIE (Cliquez-moi)
    </button>
  </div>

  <div class="login-footer">
    <div class="login-footer-text">© 2024 THIS IS IT EVENT — AINTERCOM OS V9</div>
  </div>
</div>

<!-- Supabase SDK -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<!-- Environment Variables -->
<script src="js/env.js"></script>
<!-- Auth Logic -->
<script src="js/auth-logic.js"></script>
<!-- Gateway Security -->
<script src="js/gateway.js"></script>
<!-- Login Script -->
<script src="js/login-script.js"></script>

</body>
</html>
