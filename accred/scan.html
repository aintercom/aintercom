<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Scanner — ACCRED</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#06080b;color:#e8f0f8;font-family:'Rajdhani',sans-serif;overflow:hidden;}

/* LAYOUT */
#app{height:100vh;display:flex;flex-direction:column;}

/* TOPBAR */
#topbar{background:#0c1118;border-bottom:2px solid #1e2d3d;padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.tb-logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:28px;height:28px;background:#00d97e;clip-path:polygon(0 0,100% 0,100% 70%,70% 100%,0 100%);display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-size:7px;font-weight:700;color:#000;}
.tb-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:4px;}
.tb-sub{font-family:'Share Tech Mono',monospace;font-size:8px;color:#3d5568;letter-spacing:2px;margin-top:1px;}
.zone-selector{background:#101820;border:1px solid #253545;color:#e8f0f8;border-radius:3px;padding:6px 10px;font-family:'Share Tech Mono',monospace;font-size:10px;outline:none;cursor:pointer;max-width:140px;}

/* CAMÉRA */
#camera-wrap{position:relative;flex:1;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;}
#video{width:100%;height:100%;object-fit:cover;}
#canvas{display:none;}

/* Viseur */
.viewfinder{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:220px;height:220px;pointer-events:none;}
.vf-corner{position:absolute;width:28px;height:28px;border-color:#00d97e;border-style:solid;opacity:.8;}
.vf-tl{top:0;left:0;border-width:3px 0 0 3px;}
.vf-tr{top:0;right:0;border-width:3px 3px 0 0;}
.vf-bl{bottom:0;left:0;border-width:0 0 3px 3px;}
.vf-br{bottom:0;right:0;border-width:0 3px 3px 0;}
.vf-line{position:absolute;top:50%;left:10%;right:10%;height:1px;background:linear-gradient(to right,transparent,#00d97e,transparent);animation:scan-line 2s ease-in-out infinite;}
@keyframes scan-line{0%,100%{top:15%}50%{top:85%}}

.cam-overlay{position:absolute;inset:0;background:rgba(0,0,0,.3);pointer-events:none;}

/* Résultat scan */
#result-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;padding:20px;}
#result-overlay.visible{opacity:1;}
#result-overlay.ok{background:rgba(0,217,126,.92);}
#result-overlay.denied{background:rgba(255,59,59,.92);}
#result-overlay.unknown{background:rgba(255,179,0,.92);}
.result-icon{font-size:64px;margin-bottom:12px;line-height:1;}
.result-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:4px;color:#fff;margin-bottom:4px;}
.result-name{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:#fff;margin-bottom:4px;}
.result-type{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;color:rgba(255,255,255,.7);margin-bottom:10px;}
.result-zones{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;}
.result-zone-tag{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;padding:4px 10px;border-radius:2px;background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);}

/* PANEL BAS */
#bottom-panel{background:#0c1118;border-top:2px solid #1e2d3d;padding:10px 16px;flex-shrink:0;}
.scan-status-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.scan-dot{width:8px;height:8px;border-radius:50%;background:#3d5568;flex-shrink:0;}
.scan-dot.active{background:#00d97e;animation:blink 1s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.scan-label{font-family:'Share Tech Mono',monospace;font-size:10px;color:#7a9ab5;letter-spacing:2px;margin-left:8px;}
.scan-count{font-family:'Share Tech Mono',monospace;font-size:9px;color:#3d5568;letter-spacing:1px;}

/* Log */
#scan-log{max-height:100px;overflow-y:auto;}
.log-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #1e2d3d;font-size:12px;}
.log-item:last-child{border:none;}
.log-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.log-dot.ok{background:#00d97e;}
.log-dot.denied{background:#ff3b3b;}
.log-dot.unknown{background:#ffb300;}
.log-name{flex:1;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;color:#e8f0f8;}
.log-status{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;}
.log-status.ok{color:#00d97e;}
.log-status.denied{color:#ff3b3b;}
.log-status.unknown{color:#ffb300;}
.log-time{font-family:'Share Tech Mono',monospace;font-size:8px;color:#3d5568;}

/* Start screen */
#start-screen{position:absolute;inset:0;background:#06080b;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;z-index:10;}
#start-screen.hidden{display:none;}
.start-icon{font-size:52px;}
.start-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;color:#e8f0f8;text-align:center;}
.start-sub{font-family:'Share Tech Mono',monospace;font-size:9px;color:#3d5568;letter-spacing:2px;text-align:center;line-height:1.8;}
.start-btn{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:4px;padding:14px 36px;border-radius:3px;border:none;background:#00d97e;color:#000;cursor:pointer;transition:filter .15s;}
.start-btn:hover{filter:brightness(1.1);}
.back-link{font-family:'Share Tech Mono',monospace;font-size:9px;color:#3d5568;letter-spacing:2px;text-decoration:none;transition:color .15s;}
.back-link:hover{color:#7a9ab5;}
</style>
</head>
<body>
<div id="app">

  <!-- TOPBAR -->
  <div id="topbar">
    <div class="tb-logo">
      <div class="logo-mark">AI</div>
      <div>
        <div class="tb-title">SCANNER</div>
        <div class="tb-sub">CONTRÔLE D'ACCÈS</div>
      </div>
    </div>
    <select class="zone-selector" id="zone-select" onchange="onZoneChange()">
      <option value="">— Zone à vérifier —</option>
    </select>
  </div>

  <!-- CAMÉRA -->
  <div id="camera-wrap">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas"></canvas>
    <div class="cam-overlay"></div>
    <div class="viewfinder">
      <div class="vf-corner vf-tl"></div>
      <div class="vf-corner vf-tr"></div>
      <div class="vf-corner vf-bl"></div>
      <div class="vf-corner vf-br"></div>
      <div class="vf-line"></div>
    </div>
    <div id="result-overlay">
      <div class="result-icon" id="res-icon">✓</div>
      <div class="result-title" id="res-title">ACCÈS AUTORISÉ</div>
      <div class="result-name" id="res-name">—</div>
      <div class="result-type" id="res-type">—</div>
      <div class="result-zones" id="res-zones"></div>
    </div>

    <!-- START SCREEN -->
    <div id="start-screen">
      <div class="start-icon">📷</div>
      <div class="start-title">SCANNER<br>D'ACCRÉDITATION</div>
      <div class="start-sub">
        Ouvrez cette page sur votre téléphone.<br>
        Sélectionnez la zone à contrôler,<br>
        puis activez la caméra.
      </div>
      <button class="start-btn" onclick="startCamera()">▶ ACTIVER LA CAMÉRA</button>
      <a class="back-link" href="index.html">← Retour à l'admin</a>
    </div>
  </div>

  <!-- PANEL BAS -->
  <div id="bottom-panel">
    <div class="scan-status-row">
      <div style="display:flex;align-items:center;">
        <div class="scan-dot" id="scan-dot"></div>
        <div class="scan-label" id="scan-label">EN ATTENTE</div>
      </div>
      <div class="scan-count" id="scan-count">0 scan(s)</div>
    </div>
    <div id="scan-log"></div>
  </div>
</div>

<script>
/* ══════════════════════════════════
   DATA
══════════════════════════════════ */
let db = {accreds:[], zones:[]};
let selectedZoneId = '';
let scanning = false;
let scanCount = 0;
let resultTimeout = null;
let animFrame = null;

function loadDB(){
  const raw = localStorage.getItem('tiie_accred');
  if(raw) try{ db = JSON.parse(raw); } catch(e){}
}

/* ══════════════════════════════════
   INIT ZONES
══════════════════════════════════ */
function initZones(){
  const sel = document.getElementById('zone-select');
  sel.innerHTML = '<option value="">— Zone à vérifier —</option>';
  db.zones.forEach(z=>{
    const opt = document.createElement('option');
    opt.value = z.id;
    opt.textContent = z.name;
    sel.appendChild(opt);
  });
}

function onZoneChange(){
  selectedZoneId = document.getElementById('zone-select').value;
}

/* ══════════════════════════════════
   CAMÉRA
══════════════════════════════════ */
async function startCamera(){
  document.getElementById('start-screen').classList.add('hidden');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    video.play();
    video.addEventListener('loadedmetadata',()=>{
      scanning = true;
      document.getElementById('scan-dot').classList.add('active');
      document.getElementById('scan-label').textContent = 'SCAN EN COURS';
      requestAnimationFrame(scanFrame);
    });
  } catch(e) {
    document.getElementById('start-screen').classList.remove('hidden');
    alert('Impossible d\'accéder à la caméra : '+e.message+'\n\nAssurez-vous d\'utiliser HTTPS ou localhost.');
  }
}

/* ══════════════════════════════════
   SCAN LOOP
══════════════════════════════════ */
function scanFrame(){
  if(!scanning){ return; }
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  if(video.readyState === video.HAVE_ENOUGH_DATA){
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video,0,0,canvas.width,canvas.height);
    const imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
    const code = jsQR(imageData.data,imageData.width,imageData.height,{inversionAttempts:'dontInvert'});
    if(code){ processQR(code.data); return; }
  }
  animFrame = requestAnimationFrame(scanFrame);
}

/* ══════════════════════════════════
   TRAITEMENT QR
══════════════════════════════════ */
function processQR(data){
  scanning = false;
  // Extraire l'ID depuis l'URL du badge (badge.html?id=ACC-XXX)
  let accredId = null;
  try {
    const url = new URL(data);
    accredId = url.searchParams.get('id');
  } catch(e){
    // Si c'est directement un ID
    if(data.startsWith('ACC-')) accredId = data;
  }

  if(!accredId){ showResult('unknown','⚠','QR INCONNU','Badge non reconnu','—',[]); return; }

  const person = db.accreds.find(a=>a.id===accredId);
  if(!person){ showResult('unknown','⚠','NON TROUVÉ','ID introuvable dans la base','—',[]); return; }

  if(person.statut !== 'actif'){
    showResult('denied','⊘','ACCÈS REFUSÉ',person.prenom+' '+person.nom,'BADGE SUSPENDU',[]);
    addLog('denied',person.prenom+' '+person.nom,'SUSPENDU');
    return;
  }

  const personZones = db.zones.filter(z=>person.zones.includes(z.id));

  // Vérif zone si sélectionnée
  if(selectedZoneId){
    const hasZone = person.zones.includes(selectedZoneId);
    if(!hasZone){
      const zoneName = db.zones.find(z=>z.id===selectedZoneId)?.name||'ZONE';
      showResult('denied','⊘','ACCÈS REFUSÉ',person.prenom+' '+person.nom,'NON AUTORISÉ — '+zoneName, personZones);
      addLog('denied',person.prenom+' '+person.nom,'REFUSÉ '+zoneName);
    } else {
      showResult('ok','✓','ACCÈS AUTORISÉ',person.prenom+' '+person.nom,(typeLabel(person.type)),personZones);
      addLog('ok',person.prenom+' '+person.nom,'AUTORISÉ');
    }
  } else {
    // Pas de zone sélectionnée → affiche info
    showResult('ok','✓','BADGE VALIDE',person.prenom+' '+person.nom,typeLabel(person.type),personZones);
    addLog('ok',person.prenom+' '+person.nom,'VALIDE');
  }
}

const TYPE_LABELS = {artiste:'ARTISTE',crew:'CREW',staff:'STAFF',benevole:'BÉNÉVOLE',presse:'PRESSE',vip:'VIP',securite:'SÉCURITÉ'};
const typeLabel = t => TYPE_LABELS[t]||t.toUpperCase();

function showResult(type, icon, title, name, sub, zones){
  scanCount++;
  document.getElementById('scan-count').textContent = scanCount+' scan(s)';
  const overlay = document.getElementById('result-overlay');
  overlay.className = 'visible '+type;
  document.getElementById('res-icon').textContent = icon;
  document.getElementById('res-title').textContent = title;
  document.getElementById('res-name').textContent = name;
  document.getElementById('res-type').textContent = sub;
  document.getElementById('res-zones').innerHTML = zones.map(z=>
    `<span class="result-zone-tag">${z.name}</span>`
  ).join('');

  // Vibration mobile
  if(navigator.vibrate){
    navigator.vibrate(type==='ok'?[100]:type==='denied'?[300,100,300]:[200]);
  }

  if(resultTimeout) clearTimeout(resultTimeout);
  resultTimeout = setTimeout(()=>{
    overlay.className = '';
    scanning = true;
    requestAnimationFrame(scanFrame);
  }, 2200);
}

function addLog(status, name, info){
  const log = document.getElementById('scan-log');
  const item = document.createElement('div');
  item.className = 'log-item';
  const time = new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  item.innerHTML = `
    <div class="log-dot ${status}"></div>
    <div class="log-name">${esc(name)}</div>
    <div class="log-status ${status}">${info}</div>
    <div class="log-time">${time}</div>
  `;
  log.insertBefore(item, log.firstChild);
  // Max 20 entrées
  while(log.children.length > 20) log.removeChild(log.lastChild);
}

const esc = s=>(s||'').replace(/</g,'&lt;');

/* ══════════════════════════════════
   INIT
══════════════════════════════════ */
loadDB();
initZones();
</script>
</body>
</html>
