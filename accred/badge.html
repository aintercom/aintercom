<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badge — ACCRED</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#06080b;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;}
:root{--type-color:#00d97e;}

.badge-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;padding:20px;}

/* BADGE CARD */
.badge{width:320px;background:#0a0f14;border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.6);border:1px solid #1e2d3d;}
.badge-top-bar{height:6px;background:var(--type-color);}
.badge-header{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1e2d3d;}
.badge-logo-row{display:flex;align-items:center;gap:10px;}
.logo-mark{width:32px;height:32px;background:#00d97e;clip-path:polygon(0 0,100% 0,100% 70%,70% 100%,0 100%);display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-size:8px;font-weight:700;color:#000;}
.badge-org-name{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:3px;color:#7a9ab5;}
.badge-event{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:#3d5568;margin-top:1px;}
.badge-status{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;padding:3px 8px;border-radius:2px;}
.badge-status.actif{color:#00d97e;background:rgba(0,217,126,.1);border:1px solid rgba(0,217,126,.3);}
.badge-status.suspendu{color:#ff3b3b;background:rgba(255,59,59,.1);border:1px solid rgba(255,59,59,.3);}

.badge-body{padding:16px 20px;}
.badge-type{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:4px;color:var(--type-color);margin-bottom:6px;}
.badge-name{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;color:#e8f0f8;line-height:1.05;margin-bottom:4px;}
.badge-org{font-family:'Share Tech Mono',monospace;font-size:10px;color:#3d5568;letter-spacing:2px;margin-bottom:14px;}
.badge-zones{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px;}
.zone-tag{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;padding:4px 9px;border-radius:2px;border:1px solid;font-weight:600;}

.badge-qr-section{padding:16px 20px;background:#fff;display:flex;align-items:center;justify-content:space-between;gap:14px;}
.qr-wrap{flex-shrink:0;}
.badge-qr-info{flex:1;}
.badge-id{font-family:'Share Tech Mono',monospace;font-size:9px;color:#555;letter-spacing:1px;margin-bottom:4px;}
.badge-date{font-family:'Share Tech Mono',monospace;font-size:8px;color:#888;letter-spacing:1px;}
.badge-note{font-family:'Share Tech Mono',monospace;font-size:8px;color:#888;margin-top:4px;line-height:1.4;}

.badge-footer{padding:8px 20px;background:#070c10;display:flex;align-items:center;justify-content:space-between;}
.badge-footer-txt{font-family:'Share Tech Mono',monospace;font-size:7px;color:#243040;letter-spacing:2px;}

/* BOUTONS */
.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.action-btn{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:3px;padding:10px 20px;border-radius:3px;border:1px solid #253545;background:transparent;color:#7a9ab5;cursor:pointer;transition:all .15s;text-decoration:none;}
.action-btn:hover{color:#e8f0f8;border-color:#2e4055;}
.action-btn.primary{background:#00d97e;color:#000;border-color:#00a05c;}
.action-btn.primary:hover{filter:brightness(1.1);}

/* ERROR */
.error-state{text-align:center;padding:40px;}
.error-icon{font-size:48px;margin-bottom:16px;}
.error-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:4px;color:#ff3b3b;margin-bottom:8px;}
.error-sub{font-family:'Share Tech Mono',monospace;font-size:10px;color:#3d5568;letter-spacing:2px;}
</style>
</head>
<body>
<div class="badge-wrap" id="badge-wrap">
  <div class="error-state">
    <div class="error-icon">🎫</div>
    <div class="error-title">CHARGEMENT…</div>
  </div>
</div>

<script>
const TYPE_COLORS = {
  artiste:'#ff6b35',crew:'#ffb300',staff:'#00d97e',
  benevole:'#2d9cff',presse:'#9b59f5',vip:'#00e5ff',securite:'#ff3b3b'
};
const TYPE_LABELS = {
  artiste:'ARTISTE',crew:'CREW / TECH',staff:'STAFF ORGA',
  benevole:'BÉNÉVOLE',presse:'PRESSE',vip:'VIP',securite:'SÉCURITÉ'
};

function init(){
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if(!id){ showError('Aucun identifiant de badge.'); return; }

  const raw = localStorage.getItem('tiie_accred');
  if(!raw){ showError('Base de données introuvable.'); return; }

  let db;
  try{ db = JSON.parse(raw); } catch(e){ showError('Données corrompues.'); return; }

  const person = db.accreds.find(a=>a.id===id);
  if(!person){ showError('Badge introuvable ('+id+').'); return; }

  renderBadge(person, db.zones||[]);
}

function renderBadge(a, allZones){
  const typeColor = TYPE_COLORS[a.type]||'#00d97e';
  const typeLabel = TYPE_LABELS[a.type]||a.type.toUpperCase();
  const zones = allZones.filter(z=>a.zones.includes(z.id));
  const isActif = a.statut === 'actif';

  document.documentElement.style.setProperty('--type-color', typeColor);

  const wrap = document.getElementById('badge-wrap');
  wrap.innerHTML = `
    <div class="badge">
      <div class="badge-top-bar"></div>
      <div class="badge-header">
        <div class="badge-logo-row">
          <div class="logo-mark">AI</div>
          <div>
            <div class="badge-org-name">THIS IS IT EVENT</div>
            <div class="badge-event">ACCRÉDITATION OFFICIELLE</div>
          </div>
        </div>
        <div class="badge-status ${a.statut}">${isActif?'✓ ACTIF':'⊘ SUSPENDU'}</div>
      </div>
      <div class="badge-body">
        <div class="badge-type">${typeLabel}</div>
        <div class="badge-name">${esc(a.prenom)}<br>${esc(a.nom)}</div>
        <div class="badge-org">${esc(a.org||'—')}</div>
        <div class="badge-zones">
          ${zones.map(z=>`<span class="zone-tag" style="color:${z.color};border-color:${z.color}55;background:${z.color}15">${z.name}</span>`).join('')}
          ${zones.length===0?'<span style="font-family:var(--f-mono);font-size:9px;color:#3d5568">Aucune zone assignée</span>':''}
        </div>
      </div>
      <div class="badge-qr-section">
        <div class="qr-wrap" id="qr-div"></div>
        <div class="badge-qr-info">
          <div class="badge-id">${a.id}</div>
          <div class="badge-date">${new Date(a.createdAt).toLocaleDateString('fr-FR')}</div>
          ${a.note?`<div class="badge-note">${esc(a.note)}</div>`:''}
        </div>
      </div>
      <div class="badge-footer">
        <div class="badge-footer-txt">TIIE · ACCRÉDITATION NUMÉRIQUE</div>
        <div class="badge-footer-txt">${isActif?'VALIDE':'NON VALIDE'}</div>
      </div>
    </div>
    <div class="actions">
      <button class="action-btn primary" onclick="window.print()">⊞ IMPRIMER</button>
      <a class="action-btn" href="index.html">← ADMIN</a>
      <a class="action-btn" href="../index.html">ACCUEIL</a>
    </div>
  `;

  // QR Code
  const qrUrl = window.location.href;
  new QRCode(document.getElementById('qr-div'),{
    text: qrUrl,
    width: 80, height: 80,
    colorDark:'#000000', colorLight:'#ffffff'
  });

  // Statut suspendu → overlay
  if(!isActif){
    document.querySelector('.badge').style.opacity = '0.6';
    document.querySelector('.badge').style.filter = 'grayscale(0.5)';
  }
}

function showError(msg){
  document.getElementById('badge-wrap').innerHTML = `
    <div class="error-state">
      <div class="error-icon">⊘</div>
      <div class="error-title">BADGE INVALIDE</div>
      <div class="error-sub">${msg}</div>
    </div>`;
}

const esc = s=>(s||'').replace(/</g,'&lt;');

init();
</script>
</body>
</html>
