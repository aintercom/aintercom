<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACCRED — Accréditations</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --bg:#06080b;--surface:#0c1118;--panel:#101820;--panel2:#141f2a;
  --border:#1e2d3d;--border2:#253545;--border3:#2e4055;
  --green:#00d97e;--green-dim:#00a05c;--green-glow:rgba(0,217,126,.12);
  --amber:#ffb300;--red:#ff3b3b;--blue:#2d9cff;--purple:#9b59f5;--cyan:#00e5ff;
  --t1:#e8f0f8;--t2:#7a9ab5;--t3:#3d5568;--t4:#243040;
  --f-display:'Oswald',sans-serif;--f-ui:'Rajdhani',sans-serif;--f-mono:'Share Tech Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--t1);font-family:var(--f-ui);height:100vh;display:grid;grid-template-rows:auto 1fr;overflow:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* TOPBAR */
#topbar{background:var(--surface);border-bottom:2px solid var(--border);padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.tb-left{display:flex;align-items:center;gap:10px;}
.logo-mark{width:32px;height:32px;background:var(--green);clip-path:polygon(0 0,100% 0,100% 70%,70% 100%,0 100%);display:flex;align-items:center;justify-content:center;font-family:var(--f-mono);font-size:8px;font-weight:700;color:#000;flex-shrink:0;}
.tb-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:4px;}
.tb-sub{font-family:var(--f-mono);font-size:8px;letter-spacing:2px;color:var(--t3);margin-top:1px;}
.count-badge{font-family:var(--f-mono);font-size:9px;letter-spacing:2px;color:var(--green);background:rgba(0,217,126,.08);border:1px solid rgba(0,217,126,.2);padding:4px 10px;border-radius:2px;}
.tb-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.tbtn{font-family:var(--f-display);font-size:11px;font-weight:600;letter-spacing:1px;padding:7px 13px;border-radius:3px;border:1px solid var(--border2);background:var(--panel2);color:var(--t2);cursor:pointer;transition:all .15s;text-decoration:none;white-space:nowrap;}
.tbtn:hover{color:var(--t1);border-color:var(--border3);}
.tbtn.green{background:var(--green);color:#000;border-color:var(--green-dim);}
.tbtn.green:hover{filter:brightness(1.1);}
.tbtn.blue{background:rgba(45,156,255,.15);color:var(--blue);border-color:rgba(45,156,255,.3);}

/* LAYOUT */
#body{display:grid;grid-template-columns:240px 1fr;overflow:hidden;}

/* SIDEBAR */
#sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
.sb-section{padding:12px 10px 6px;}
.sb-section-title{font-family:var(--f-mono);font-size:8px;letter-spacing:3px;color:var(--t4);padding:0 6px;margin-bottom:6px;}

/* Stat cards */
.stat-card{background:var(--panel2);border:1px solid var(--border);border-left:3px solid var(--border2);border-radius:4px;padding:9px 12px;margin-bottom:5px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:10px;}
.stat-card:hover,.stat-card.active{background:var(--panel);border-color:var(--border2);}
.stat-card.active{border-left-color:var(--green);}
.stat-icon{font-size:16px;flex-shrink:0;}
.stat-info{flex:1;min-width:0;}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1;color:var(--t1);}
.stat-lbl{font-family:var(--f-mono);font-size:8px;letter-spacing:1px;color:var(--t3);margin-top:1px;}

/* Type filters */
.type-btn{width:100%;text-align:left;padding:7px 10px;border:none;background:transparent;color:var(--t3);cursor:pointer;font-family:var(--f-mono);font-size:9px;letter-spacing:1px;border-radius:3px;transition:all .15s;display:flex;align-items:center;gap:7px;}
.type-btn:hover{color:var(--t2);background:var(--panel2);}
.type-btn.active{color:var(--green);background:rgba(0,217,126,.06);}
.type-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* Zones panel */
.zone-item{background:var(--panel2);border:1px solid var(--border);border-radius:4px;padding:8px 10px;margin-bottom:5px;display:flex;align-items:center;gap:8px;}
.zone-color{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.zone-name{font-family:var(--f-display);font-size:12px;font-weight:600;letter-spacing:1px;flex:1;}
.zone-count{font-family:var(--f-mono);font-size:9px;color:var(--t3);}
.zone-del{background:none;border:none;color:var(--t4);cursor:pointer;font-size:11px;transition:color .15s;}
.zone-del:hover{color:var(--red);}
.add-zone-row{display:flex;gap:5px;margin-top:6px;}
.zone-input{flex:1;background:var(--panel2);border:1px solid var(--border2);color:var(--t1);border-radius:3px;padding:6px 8px;font-family:var(--f-mono);font-size:10px;outline:none;}
.zone-input:focus{border-color:var(--green);}
.zone-color-pick{width:28px;height:28px;border-radius:3px;border:1px solid var(--border2);cursor:pointer;padding:2px;}
.zone-add-btn{padding:6px 10px;border-radius:3px;border:none;background:var(--green);color:#000;cursor:pointer;font-family:var(--f-mono);font-size:9px;font-weight:700;}

/* MAIN */
#main{display:flex;flex-direction:column;overflow:hidden;}
.search-bar{padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;}
.search-input{flex:1;background:var(--panel2);border:1px solid var(--border2);color:var(--t1);border-radius:3px;padding:8px 12px;font-family:var(--f-ui);font-size:13px;outline:none;transition:border-color .15s;}
.search-input:focus{border-color:var(--green);}
.search-input::placeholder{color:var(--t4);}
.results-info{font-family:var(--f-mono);font-size:9px;color:var(--t3);white-space:nowrap;}

/* Grid accrédités */
#grid-wrap{overflow-y:auto;flex:1;padding:14px;}
.accred-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;}

/* Card accrédité */
.acc-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;transition:all .15s;cursor:pointer;}
.acc-card:hover{border-color:var(--border2);transform:translateY(-1px);}
.acc-card-top{padding:12px 14px 10px;border-left:4px solid var(--border2);transition:border-color .2s;}
.acc-card.actif .acc-card-top{border-left-color:var(--green);}
.acc-card.suspendu .acc-card-top{border-left-color:var(--red);}
.acc-card-type{font-family:var(--f-mono);font-size:8px;letter-spacing:2px;margin-bottom:5px;}
.acc-card-name{font-family:var(--f-display);font-size:15px;font-weight:600;letter-spacing:1px;color:var(--t1);margin-bottom:2px;}
.acc-card-email{font-size:11px;color:var(--t3);font-family:var(--f-mono);margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.acc-card-zones{display:flex;gap:3px;flex-wrap:wrap;}
.zone-chip{font-family:var(--f-mono);font-size:7px;letter-spacing:1px;padding:2px 6px;border-radius:2px;border:1px solid;white-space:nowrap;}
.acc-card-bottom{padding:7px 14px;background:var(--panel2);border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.acc-card-id{font-family:var(--f-mono);font-size:8px;color:var(--t4);}
.acc-card-status{font-family:var(--f-mono);font-size:8px;letter-spacing:1px;}
.acc-card-status.actif{color:var(--green);}
.acc-card-status.suspendu{color:var(--red);}

/* Empty state */
.empty-state{padding:60px;text-align:center;}
.empty-icon{font-size:40px;margin-bottom:14px;}
.empty-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--t3);margin-bottom:6px;}
.empty-sub{font-family:var(--f-mono);font-size:10px;color:var(--t4);letter-spacing:1px;}

/* MODALES */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.visible{opacity:1;pointer-events:all;}
.modal{background:var(--panel);border:1px solid var(--border2);border-top:3px solid var(--green);border-radius:6px;padding:26px;width:520px;max-width:94vw;max-height:88vh;overflow-y:auto;transform:translateY(14px);transition:transform .2s;position:relative;}
.modal-overlay.visible .modal{transform:translateY(0);}
.modal-close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--t3);cursor:pointer;font-size:17px;}
.modal-close:hover{color:var(--t1);}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:4px;margin-bottom:16px;}
.form-group{margin-bottom:12px;}
.form-label{font-family:var(--f-mono);font-size:8px;letter-spacing:3px;color:var(--t3);display:block;margin-bottom:4px;text-transform:uppercase;}
.form-input,.form-select,.form-textarea{width:100%;background:var(--panel2);border:1px solid var(--border2);color:var(--t1);border-radius:3px;padding:9px 12px;font-family:var(--f-ui);font-size:13px;font-weight:500;outline:none;transition:border-color .15s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--green);}
.form-input::placeholder{color:var(--t4);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* Zones checkboxes */
.zones-check-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px;}
.zone-check-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid var(--border2);border-radius:3px;cursor:pointer;transition:all .15s;}
.zone-check-item:hover{border-color:var(--border3);}
.zone-check-item.selected{background:rgba(0,217,126,.06);}
.zone-cb{width:16px;height:16px;border-radius:2px;border:2px solid var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:9px;color:#000;}
.zone-check-item.selected .zone-cb{background:var(--green);border-color:var(--green);}
.zone-check-name{font-family:var(--f-display);font-size:12px;font-weight:600;letter-spacing:1px;color:var(--t1);}

/* Modal actions */
.modal-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;}
.modal-btn{font-family:var(--f-display);font-size:12px;font-weight:600;letter-spacing:2px;padding:9px 18px;border-radius:3px;border:none;cursor:pointer;transition:all .15s;}
.modal-btn.ok{background:var(--green);color:#000;}
.modal-btn.ok:hover{filter:brightness(1.1);}
.modal-btn.cancel{background:var(--panel2);color:var(--t2);border:1px solid var(--border2);}
.modal-btn.danger{background:var(--red);color:#fff;}

/* Badge preview in modal */
.badge-preview-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding:16px;background:var(--panel2);border:1px solid var(--border2);border-radius:4px;margin-bottom:10px;}
.badge-card{width:280px;background:#0a0f14;border-radius:8px;overflow:hidden;border:1px solid var(--border2);}
.badge-header{padding:14px 16px 10px;display:flex;align-items:center;gap:10px;}
.badge-logo{width:28px;height:28px;background:var(--green);clip-path:polygon(0 0,100% 0,100% 70%,70% 100%,0 100%);display:flex;align-items:center;justify-content:center;font-family:var(--f-mono);font-size:7px;font-weight:700;color:#000;flex-shrink:0;}
.badge-org{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:3px;color:var(--t2);}
.badge-body{padding:10px 16px 14px;}
.badge-type-tag{font-family:var(--f-mono);font-size:8px;letter-spacing:3px;margin-bottom:6px;}
.badge-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--t1);line-height:1.1;}
.badge-zones-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px;}
.badge-qr{padding:10px 16px;background:#fff;display:flex;align-items:center;justify-content:center;border-top:1px solid var(--border);}
#badge-qr-preview{width:80px;height:80px;}
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div class="tb-left">
    <div class="logo-mark">AI</div>
    <div>
      <div class="tb-title">ACCRED</div>
      <div class="tb-sub">GESTION DES ACCRÉDITATIONS</div>
    </div>
    <div class="count-badge" id="total-badge">0 ACCRÉDITÉ(S)</div>
  </div>
  <div class="tb-right">
    <button class="tbtn blue" onclick="importBenevoles()">⤑ IMPORT BÉNÉVOLES</button>
    <button class="tbtn" onclick="exportCSV()">⤓ CSV</button>
    <a class="tbtn" href="scan.html" target="_blank">📷 SCANNER</a>
    <button class="tbtn green" onclick="openAddModal()">+ AJOUTER</button>
    <a class="tbtn" href="../index.html">⊞ ACCUEIL</a>
  </div>
</div>

<!-- BODY -->
<div id="body">

  <!-- SIDEBAR -->
  <div id="sidebar">

    <div class="sb-section">
      <div class="sb-section-title">TYPES</div>
      <div class="stat-card active" onclick="filterType('')" id="sc-all">
        <div class="stat-icon">👥</div>
        <div class="stat-info">
          <div class="stat-num" id="sn-all">0</div>
          <div class="stat-lbl">TOUS</div>
        </div>
      </div>
    </div>

    <div class="sb-section" style="padding-top:4px;">
      <button class="type-btn active" onclick="filterType('')" id="tf-all"><div class="type-dot" style="background:var(--t3)"></div>TOUS</button>
      <button class="type-btn" onclick="filterType('artiste')" id="tf-artiste"><div class="type-dot" style="background:#ff6b35"></div>🎤 ARTISTE</button>
      <button class="type-btn" onclick="filterType('crew')" id="tf-crew"><div class="type-dot" style="background:var(--amber)"></div>🔧 CREW / TECH</button>
      <button class="type-btn" onclick="filterType('staff')" id="tf-staff"><div class="type-dot" style="background:var(--green)"></div>🟢 STAFF ORGA</button>
      <button class="type-btn" onclick="filterType('benevole')" id="tf-benevole"><div class="type-dot" style="background:var(--blue)"></div>🤝 BÉNÉVOLE</button>
      <button class="type-btn" onclick="filterType('presse')" id="tf-presse"><div class="type-dot" style="background:var(--purple)"></div>📸 PRESSE</button>
      <button class="type-btn" onclick="filterType('vip')" id="tf-vip"><div class="type-dot" style="background:var(--cyan)"></div>⭐ VIP</button>
      <button class="type-btn" onclick="filterType('securite')" id="tf-securite"><div class="type-dot" style="background:var(--red)"></div>🛡 SÉCURITÉ</button>
    </div>

    <div class="sb-section" style="flex:1;">
      <div class="sb-section-title">ZONES D'ACCÈS</div>
      <div id="zones-list"></div>
      <div class="add-zone-row">
        <input class="zone-input" type="text" id="new-zone-name" placeholder="Nom de zone…" maxlength="20">
        <input class="zone-color-pick" type="color" id="new-zone-color" value="#00d97e">
        <button class="zone-add-btn" onclick="addZone()">+</button>
      </div>
    </div>

  </div>

  <!-- MAIN -->
  <div id="main">
    <div class="search-bar">
      <input class="search-input" type="text" id="search-input" placeholder="Rechercher par nom, email, type…" oninput="renderGrid()">
      <div class="results-info" id="results-info">0 résultat(s)</div>
    </div>
    <div id="grid-wrap">
      <div class="accred-grid" id="accred-grid"></div>
      <div id="empty-state" class="empty-state" style="display:none;">
        <div class="empty-icon">🎫</div>
        <div class="empty-title">AUCUN ACCRÉDITÉ</div>
        <div class="empty-sub">Ajoutez des personnes ou importez depuis le module Bénévolat</div>
      </div>
    </div>
  </div>
</div>

<!-- MODALE AJOUTER / ÉDITER -->
<div class="modal-overlay" id="modal-add" onclick="if(event.target===this)closeModal('modal-add')">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal-add')">✕</button>
    <div class="modal-title" id="add-modal-title">NOUVELLE ACCRÉDITATION</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Prénom *</label>
        <input class="form-input" type="text" id="a-prenom" placeholder="Marie">
      </div>
      <div class="form-group">
        <label class="form-label">Nom *</label>
        <input class="form-input" type="text" id="a-nom" placeholder="Dupont">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="a-email" placeholder="marie@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">Type *</label>
        <select class="form-select" id="a-type">
          <option value="staff">Staff Orga</option>
          <option value="artiste">Artiste</option>
          <option value="crew">Crew / Tech</option>
          <option value="benevole">Bénévole</option>
          <option value="presse">Presse</option>
          <option value="vip">VIP</option>
          <option value="securite">Sécurité</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Organisation / Artiste / Média</label>
      <input class="form-input" type="text" id="a-org" placeholder="Nom du groupe, média, société…">
    </div>
    <div class="form-group">
      <label class="form-label">Zones autorisées *</label>
      <div class="zones-check-grid" id="zones-check-grid"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Note interne</label>
      <input class="form-input" type="text" id="a-note" placeholder="Remarque…">
    </div>
    <div class="modal-actions">
      <button class="modal-btn ok" onclick="saveAccred()">✓ ENREGISTRER</button>
      <button class="modal-btn cancel" onclick="closeModal('modal-add')">ANNULER</button>
      <button class="modal-btn danger" id="btn-del-accred" style="display:none" onclick="deleteAccred()">SUPPRIMER</button>
    </div>
  </div>
</div>

<!-- MODALE BADGE -->
<div class="modal-overlay" id="modal-badge" onclick="if(event.target===this)closeModal('modal-badge')">
  <div class="modal" style="width:360px;">
    <button class="modal-close" onclick="closeModal('modal-badge')">✕</button>
    <div class="modal-title">BADGE NUMÉRIQUE</div>
    <div class="badge-preview-wrap">
      <div class="badge-card" id="badge-card-preview">
        <div class="badge-header">
          <div class="badge-logo">AI</div>
          <div class="badge-org">THIS IS IT EVENT</div>
        </div>
        <div class="badge-body">
          <div class="badge-type-tag" id="bp-type">—</div>
          <div class="badge-name" id="bp-name">—</div>
          <div class="badge-zones-row" id="bp-zones"></div>
        </div>
        <div class="badge-qr">
          <div id="badge-qr-preview"></div>
        </div>
      </div>
    </div>
    <div class="modal-actions" style="justify-content:center;">
      <a class="modal-btn ok" id="badge-open-link" href="#" target="_blank">⊞ OUVRIR BADGE MOBILE</a>
      <button class="modal-btn cancel" onclick="closeModal('modal-badge')">FERMER</button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════
   CONSTANTES
══════════════════════════════════ */
const TYPE_COLORS = {
  artiste:'#ff6b35',crew:var_amber(),staff:'#00d97e',
  benevole:'#2d9cff',presse:'#9b59f5',vip:'#00e5ff',securite:'#ff3b3b'
};
function var_amber(){return '#ffb300';}

const TYPE_LABELS = {
  artiste:'ARTISTE',crew:'CREW / TECH',staff:'STAFF',
  benevole:'BÉNÉVOLE',presse:'PRESSE',vip:'VIP',securite:'SÉCURITÉ'
};

/* ══════════════════════════════════
   DATA
══════════════════════════════════ */
let db = {
  accreds: [],
  zones: [
    {id:'z1',name:'SCÈNE',color:'#ff6b35'},
    {id:'z2',name:'BACKSTAGE',color:'#00d97e'},
    {id:'z3',name:'LOGES',color:'#ffb300'},
    {id:'z4',name:'PIT PRESSE',color:'#9b59f5'},
    {id:'z5',name:'VIP',color:'#00e5ff'},
    {id:'z6',name:'TECHNIQUE',color:'#2d9cff'},
  ]
};
let filterTypeVal = '';
let editingId = null;

function loadDB(){
  const saved = localStorage.getItem('tiie_accred');
  if(saved) db = JSON.parse(saved);
}
function saveDB(){ localStorage.setItem('tiie_accred', JSON.stringify(db)); }
const uid = () => 'ACC-'+Date.now().toString(36).toUpperCase();

/* ══════════════════════════════════
   ZONES
══════════════════════════════════ */
function renderZones(){
  const list = document.getElementById('zones-list');
  list.innerHTML = db.zones.map(z => `
    <div class="zone-item">
      <div class="zone-color" style="background:${z.color}"></div>
      <div class="zone-name">${z.name}</div>
      <div class="zone-count">${db.accreds.filter(a=>a.zones.includes(z.id)).length}</div>
      <button class="zone-del" onclick="deleteZone('${z.id}')">✕</button>
    </div>
  `).join('');
}

function addZone(){
  const name = document.getElementById('new-zone-name').value.trim().toUpperCase();
  const color = document.getElementById('new-zone-color').value;
  if(!name) return;
  db.zones.push({id:'z'+Date.now(),name,color});
  document.getElementById('new-zone-name').value='';
  saveDB(); renderZones(); renderGrid();
}

function deleteZone(id){
  if(!confirm('Supprimer cette zone ? Elle sera retirée de toutes les accréditations.')) return;
  db.zones = db.zones.filter(z=>z.id!==id);
  db.accreds.forEach(a=>{ a.zones = a.zones.filter(z=>z!==id); });
  saveDB(); renderZones(); renderGrid();
}

/* ══════════════════════════════════
   FILTRES
══════════════════════════════════ */
function filterType(val){
  filterTypeVal = val;
  document.querySelectorAll('[id^="tf-"]').forEach(el=>el.classList.remove('active'));
  document.getElementById('tf-'+(val||'all')).classList.add('active');
  renderGrid();
}

function filteredData(){
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  return db.accreds.filter(a => {
    const matchType = !filterTypeVal || a.type === filterTypeVal;
    const matchQ = !q ||
      (a.prenom+' '+a.nom).toLowerCase().includes(q) ||
      (a.email||'').toLowerCase().includes(q) ||
      a.type.toLowerCase().includes(q);
    return matchType && matchQ;
  });
}

/* ══════════════════════════════════
   RENDER
══════════════════════════════════ */
function renderGrid(){
  const data = filteredData();
  document.getElementById('total-badge').textContent = db.accreds.length+' ACCRÉDITÉ(S)';
  document.getElementById('sn-all').textContent = db.accreds.length;
  document.getElementById('results-info').textContent = data.length+' résultat(s)';
  const grid = document.getElementById('accred-grid');
  const empty = document.getElementById('empty-state');

  if(data.length === 0){ grid.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';

  grid.innerHTML = data.map(a => {
    const typeColor = TYPE_COLORS[a.type]||'var(--t3)';
    const typeLabel = TYPE_LABELS[a.type]||a.type;
    const zones = db.zones.filter(z=>a.zones.includes(z.id));
    return `
    <div class="acc-card ${a.statut}" onclick="openBadge('${a.id}')">
      <div class="acc-card-top">
        <div class="acc-card-type" style="color:${typeColor}">${typeLabel}</div>
        <div class="acc-card-name">${esc(a.prenom)} ${esc(a.nom)}</div>
        <div class="acc-card-email">${esc(a.email||a.org||'—')}</div>
        <div class="acc-card-zones">
          ${zones.map(z=>`<span class="zone-chip" style="color:${z.color};border-color:${z.color}33;background:${z.color}11">${z.name}</span>`).join('')}
        </div>
      </div>
      <div class="acc-card-bottom">
        <div class="acc-card-id">${a.id}</div>
        <div class="acc-card-status ${a.statut}">${a.statut==='actif'?'✓ ACTIF':'⊘ SUSPENDU'}</div>
      </div>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════
   AJOUTER / ÉDITER
══════════════════════════════════ */
function openAddModal(id){
  editingId = id||null;
  const a = id ? db.accreds.find(x=>x.id===id) : null;
  document.getElementById('add-modal-title').textContent = id?'MODIFIER ACCRÉDITATION':'NOUVELLE ACCRÉDITATION';
  document.getElementById('a-prenom').value = a?.prenom||'';
  document.getElementById('a-nom').value    = a?.nom||'';
  document.getElementById('a-email').value  = a?.email||'';
  document.getElementById('a-type').value   = a?.type||'staff';
  document.getElementById('a-org').value    = a?.org||'';
  document.getElementById('a-note').value   = a?.note||'';
  document.getElementById('btn-del-accred').style.display = id?'block':'none';

  const grid = document.getElementById('zones-check-grid');
  grid.innerHTML = db.zones.map(z=>`
    <div class="zone-check-item ${a?.zones?.includes(z.id)?'selected':''}" onclick="toggleZoneCheck(this,'${z.id}')">
      <div class="zone-cb">${a?.zones?.includes(z.id)?'✓':''}</div>
      <div class="zone-check-name" style="color:${z.color}">${z.name}</div>
    </div>
  `).join('');
  openModal('modal-add');
}

function toggleZoneCheck(el,zid){
  el.classList.toggle('selected');
  const cb = el.querySelector('.zone-cb');
  cb.textContent = el.classList.contains('selected')?'✓':'';
}

function saveAccred(){
  const prenom = document.getElementById('a-prenom').value.trim();
  const nom    = document.getElementById('a-nom').value.trim();
  if(!prenom||!nom){alert('Prénom et Nom obligatoires');return;}
  const selectedZones = [...document.querySelectorAll('.zone-check-item.selected')]
    .map(el=>{const m=el.onclick?.toString().match(/'([^']+)'/);return m?m[1]:null;})
    .filter(Boolean);

  // extract zone ids from onclick
  const zoneIds = [...document.querySelectorAll('.zone-check-item.selected')]
    .map(el=>el.getAttribute('onclick').match(/'([^']+)'/)[1]);

  if(editingId){
    const a = db.accreds.find(x=>x.id===editingId);
    if(a){
      a.prenom=prenom;a.nom=nom;
      a.email=document.getElementById('a-email').value.trim();
      a.type=document.getElementById('a-type').value;
      a.org=document.getElementById('a-org').value.trim();
      a.note=document.getElementById('a-note').value.trim();
      a.zones=zoneIds;
    }
  } else {
    db.accreds.push({
      id:uid(),createdAt:new Date().toISOString(),statut:'actif',
      prenom,nom,
      email:document.getElementById('a-email').value.trim(),
      type:document.getElementById('a-type').value,
      org:document.getElementById('a-org').value.trim(),
      note:document.getElementById('a-note').value.trim(),
      zones:zoneIds
    });
  }
  saveDB();closeModal('modal-add');renderGrid();renderZones();
}

function deleteAccred(){
  if(!confirm('Supprimer cette accréditation ?')) return;
  db.accreds = db.accreds.filter(x=>x.id!==editingId);
  saveDB();closeModal('modal-add');renderGrid();renderZones();
}

/* ══════════════════════════════════
   BADGE
══════════════════════════════════ */
function openBadge(id){
  const a = db.accreds.find(x=>x.id===id);
  if(!a) return;
  const typeColor = TYPE_COLORS[a.type]||'var(--t3)';
  const typeLabel = TYPE_LABELS[a.type]||a.type;
  const zones = db.zones.filter(z=>a.zones.includes(z.id));
  document.getElementById('bp-type').textContent = typeLabel;
  document.getElementById('bp-type').style.color = typeColor;
  document.getElementById('bp-name').textContent = a.prenom+' '+a.nom;
  document.getElementById('bp-zones').innerHTML = zones.map(z=>
    `<span class="zone-chip" style="color:${z.color};border-color:${z.color}44;background:${z.color}15;font-size:8px;padding:2px 7px;border-radius:2px;border:1px solid">${z.name}</span>`
  ).join('');

  // QR Code
  const qrDiv = document.getElementById('badge-qr-preview');
  qrDiv.innerHTML='';
  const badgeUrl = window.location.origin+window.location.pathname.replace('index.html','')+'badge.html?id='+a.id;
  new QRCode(qrDiv,{text:badgeUrl,width:80,height:80,colorDark:'#000',colorLight:'#fff'});
  document.getElementById('badge-open-link').href = 'badge.html?id='+a.id;
  openModal('modal-badge');
}

/* ══════════════════════════════════
   IMPORT BÉNÉVOLES
══════════════════════════════════ */
function importBenevoles(){
  const raw = localStorage.getItem('tiie_accred_import') || localStorage.getItem('tiie_benevoles');
  if(!raw){alert('Aucune donnée bénévole trouvée.\nSoumettez d\'abord des inscriptions dans le module Bénévolat.');return;}

  let list;
  try{ list = JSON.parse(raw); } catch(e){ alert('Données invalides'); return; }
  if(!Array.isArray(list)||list.length===0){alert('Aucun bénévole à importer.');return;}

  // Si c'est le format brut bénévolat (pas encore exporté vers accred)
  if(list[0] && list[0].prenom){
    list = list.filter(b=>['confirme','mission_envoyee','present','selectionne'].includes(b.statut)||!b.statut)
      .map(b=>({
        id:'ACC-BEN-'+b.id,prenom:b.prenom,nom:b.nom,
        email:b.email,type:'benevole',org:'Bénévole',
        zones: db.zones.filter(z=>z.name==='ACCÈS BÉNÉVOLE').map(z=>z.id),
        statut:'actif',note:'Importé depuis Bénévolat'
      }));
  }

  let added=0;
  list.forEach(item=>{
    if(!db.accreds.find(a=>a.id===item.id)){
      // Assigner zone bénévole par défaut si elle existe
      const benZone = db.zones.find(z=>z.name==='BACKSTAGE'||z.name==='SCÈNE');
      db.accreds.push({
        id:item.id||uid(),createdAt:new Date().toISOString(),statut:'actif',
        prenom:item.prenom||item.nom,nom:item.nom||'',
        email:item.email||'',type:item.type||'benevole',
        org:item.org||'',zones:item.zones||[],note:item.note||''
      });
      added++;
    }
  });
  saveDB();renderGrid();renderZones();
  alert(`✓ ${added} bénévole(s) importé(s) dans ACCRED.`);
}

/* ══════════════════════════════════
   EXPORT CSV
══════════════════════════════════ */
function exportCSV(){
  if(db.accreds.length===0){alert('Aucune donnée.');return;}
  let csv='ID,Prénom,Nom,Email,Type,Organisation,Zones,Statut,Note\n';
  db.accreds.forEach(a=>{
    const zonesNames = db.zones.filter(z=>a.zones.includes(z.id)).map(z=>z.name).join('|');
    csv+=`"${a.id}","${a.prenom}","${a.nom}","${a.email||''}","${a.type}","${a.org||''}","${zonesNames}","${a.statut}","${a.note||''}"\n`;
  });
  const b=new Blob([csv],{type:'text/csv'});
  const u=URL.createObjectURL(b);
  const el=document.createElement('a');el.href=u;el.download='accreditations_tiie.csv';el.click();
  URL.revokeObjectURL(u);
}

loadDB();
renderZones();
renderGrid();
window.addEventListener('focus',()=>{loadDB();renderGrid();renderZones();});
