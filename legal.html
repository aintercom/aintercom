.grain-overlay{position:relative}

#scroll-bar{position:fixed;top:0;left:0;height:3px;background:var(--grad-90);z-index:9999;width:0%;transition:width .05s linear;border-radius:0 2px 2px 0}

.ctrl-btn{width:34px;height:34px;border-radius:8px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;color:var(--muted)}
